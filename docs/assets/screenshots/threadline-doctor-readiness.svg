<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="780" viewBox="0 0 1280 780" role="img" aria-labelledby="title desc">
  <title id="title">ThreadlineAI Doctor readiness screenshot-style visual</title>
  <desc id="desc">A screenshot-style illustration of ThreadlineAI Doctor, provider setup, extension readiness, service status, and release confidence checks.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop offset="0%" stop-color="#0f172a"/><stop offset="100%" stop-color="#312e81"/></linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%"><feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000" flood-opacity="0.25"/></filter>
  </defs>
  <rect width="1280" height="780" fill="url(#bg)"/>
  <rect x="104" y="66" width="1072" height="648" rx="24" fill="#f8fafc" filter="url(#shadow)"/>
  <rect x="104" y="66" width="1072" height="74" rx="24" fill="#111827"/>
  <text x="140" y="113" font-family="Segoe UI, Arial" font-size="28" font-weight="700" fill="#ffffff">ThreadlineAI Doctor</text>
  <text x="952" y="113" font-family="Segoe UI, Arial" font-size="17" fill="#a7f3d0">Readiness: Ready</text>
  <rect x="140" y="170" width="300" height="500" rx="18" fill="#ffffff" stroke="#d1d5db"/>
  <text x="166" y="210" font-family="Segoe UI, Arial" font-size="20" font-weight="700" fill="#111827">Commercial Runtime</text>
  <text x="166" y="248" font-family="Segoe UI, Arial" font-size="15" fill="#374151">Version: 23.x release candidate</text>
  <text x="166" y="278" font-family="Segoe UI, Arial" font-size="15" fill="#374151">Service: ThreadlineAIService</text>
  <text x="166" y="308" font-family="Segoe UI, Arial" font-size="15" fill="#374151">Endpoint: 127.0.0.1:5057</text>
  <text x="166" y="338" font-family="Segoe UI, Arial" font-size="15" fill="#374151">Mode: local-first</text>
  <rect x="166" y="376" width="238" height="42" rx="21" fill="#dcfce7"/>
  <text x="285" y="403" text-anchor="middle" font-family="Segoe UI, Arial" font-size="15" font-weight="700" fill="#166534">Local API Protected</text>
  <rect x="166" y="436" width="238" height="42" rx="21" fill="#dbeafe"/>
  <text x="285" y="463" text-anchor="middle" font-family="Segoe UI, Arial" font-size="15" font-weight="700" fill="#1d4ed8">Diagnostics Export</text>
  <rect x="166" y="496" width="238" height="42" rx="21" fill="#fef3c7"/>
  <text x="285" y="523" text-anchor="middle" font-family="Segoe UI, Arial" font-size="15" font-weight="700" fill="#92400e">Clear Data Guarded</text>
  <rect x="480" y="170" width="320" height="500" rx="18" fill="#ffffff" stroke="#d1d5db"/>
  <text x="506" y="210" font-family="Segoe UI, Arial" font-size="20" font-weight="700" fill="#111827">Doctor Checks</text>
  <g font-family="Segoe UI, Arial" font-size="15" fill="#374151">
    <text x="506" y="250">✓ Service running</text>
    <text x="506" y="286">✓ SQLite writable</text>
    <text x="506" y="322">✓ Provider configured</text>
    <text x="506" y="358">✓ Provider test passed</text>
    <text x="506" y="394">✓ Active session loaded</text>
    <text x="506" y="430">✓ Work Thread memory ready</text>
    <text x="506" y="466">✓ Browser extension reachable</text>
    <text x="506" y="502">✓ Current context classified</text>
    <text x="506" y="538">✓ Sidecar geometry restored</text>
    <text x="506" y="574">✓ Last provider error clear</text>
  </g>
  <rect x="840" y="170" width="300" height="500" rx="18" fill="#ffffff" stroke="#d1d5db"/>
  <text x="866" y="210" font-family="Segoe UI, Arial" font-size="20" font-weight="700" fill="#111827">Release Gates</text>
  <rect x="866" y="238" width="238" height="78" rx="14" fill="#eef2ff"/>
  <text x="886" y="268" font-family="Segoe UI, Arial" font-size="15" font-weight="700" fill="#3730a3">Automated Tests</text>
  <text x="886" y="294" font-family="Segoe UI, Arial" font-size="13" fill="#374151">Core, infrastructure, service</text>
  <rect x="866" y="336" width="238" height="78" rx="14" fill="#ecfdf5"/>
  <text x="886" y="366" font-family="Segoe UI, Arial" font-size="15" font-weight="700" fill="#065f46">Smoke Validation</text>
  <text x="886" y="392" font-family="Segoe UI, Arial" font-size="13" fill="#374151">Build 23 service/API checks</text>
  <rect x="866" y="434" width="238" height="78" rx="14" fill="#fff7ed"/>
  <text x="886" y="464" font-family="Segoe UI, Arial" font-size="15" font-weight="700" fill="#9a3412">Package Staging</text>
  <text x="886" y="490" font-family="Segoe UI, Arial" font-size="13" fill="#374151">Sidecar, service, extension</text>
  <rect x="866" y="532" width="238" height="78" rx="14" fill="#fef2f2"/>
  <text x="886" y="562" font-family="Segoe UI, Arial" font-size="15" font-weight="700" fill="#991b1b">Manual QA</text>
  <text x="886" y="588" font-family="Segoe UI, Arial" font-size="13" fill="#374151">Context, privacy, artifacts</text>
</svg>