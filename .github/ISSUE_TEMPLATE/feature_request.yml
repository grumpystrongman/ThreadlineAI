name: Feature request
description: Suggest a product capability or improvement.
title: "Feature: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
      description: What user problem does this address?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the feature or change.
    validations:
      required: true
  - type: textarea
    id: privacy
    attributes:
      label: Security/privacy considerations
      description: Does this change capture, store, or send new context?
    validations:
      required: true
