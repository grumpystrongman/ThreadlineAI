name: Bug report
description: Report a reproducible problem.
title: "Bug: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: List the exact steps to reproduce.
      placeholder: |
        1. Start ThreadlineAI
        2. Start a session
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: privacy
    attributes:
      label: Security/privacy impact
      description: Did the issue involve capture, provider calls, secrets, or local context?
    validations:
      required: false
